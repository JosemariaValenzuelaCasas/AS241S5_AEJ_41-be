# kubectl apply -f josemaria-valenzuela-41-deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: josemaria-valenzuela-41-deployment
  namespace: josemaria-valenzuela-41-namespace
spec:
  replicas: 3
  selector:
    matchLabels:
      app: josemaria-valenzuela-41-deployment        # Debe coincidir con las etiquetas del Service
  template:
    metadata:
      labels:
        app: josemaria-valenzuela-41-deployment      # Debe coincidir con las etiquetas del Service
    spec:
      containers:
      - name: josemaria-valenzuela-41-container
        image: juan321/age-detector-be:1.0   # Reemplaza con tu imagen Docker Hub
        imagePullPolicy: IfNotPresent        # Evitar traer siempre la última versión si hay una actual
        envFrom:
        - secretRef:
            name: josemaria-valenzuela-41-secret  # Esto cargará todos los valores como variables de entorno